<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat APP - Opdr 1 Netwerken</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
      #messages::-webkit-scrollbar {
        width: 6px;
      }
      #messages::-webkit-scrollbar-thumb {
        background: #4b5563;
        border-radius: 10px;
      }
    </style>
  </head>
  <body
    class="bg-gray-950 text-gray-100 flex items-center justify-center min-h-screen font-mono"
  >
    <div
      class="w-full max-w-4xl bg-gray-900 border border-gray-800 shadow-2xl rounded-2xl overflow-hidden flex flex-col h-[80vh]"
    >
      <div
        class="p-4 border-b border-gray-800 bg-gray-900/50 flex justify-between items-center"
      >
        <div>
          <h1 class="text-xl font-bold text-blue-400">
            Netwerken en Security Vervolg - Chat App
          </h1>
        </div>
      </div>

      <div
        id="messages"
        class="flex-1 overflow-y-auto p-6 space-y-4 flex flex-col bg-black"
      >
      </div>

      <div class="p-4 bg-gray-900 border-t border-gray-800">
        <form id="chatForm" class="flex flex-col sm:flex-row gap-3">
          <input
            type="text"
            id="username"
            placeholder="Username"
            class="w-full sm:w-32 bg-gray-900 border border-gray-700 text-blue-400 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 font-mono text-sm"
            value="User"
          />

          <div class="relative flex-1">
            <input
              type="text"
              id="messageInput"
              autocomplete="off"
              placeholder="Vul hier je bericht in..."
              class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition-all font-mono text-sm"
            />
          </div>

          <button
            type="submit"
            class="bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-bold px-6 py-3 rounded-xl transition-all flex items-center justify-center gap-2 group"
	    id="send"
          >
            <span>Send</span>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4 transform group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"
              />
            </svg>
          </button>
        </form>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
